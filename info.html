<!DOCTYPE html>
<html lang="en">
<head>
    <title>Information - FitMeal Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center">About FitMeal Hub</h2>

    <!-- About -->
    <div class="card p-3 mt-3">
        <p>
            FitMeal Hub provides healthy and affordable meal packages for students and working adults.
            Our goal is to promote a healthy lifestyle with balanced nutrition meals.
        </p>
    </div>

    <!-- Contact Info -->
    <div class="card p-3 mt-3">
        <h4>Contact Us</h4>
        <p>Email: fitmealhub@gmail.com</p>
        <p>Phone: 012-3456789</p>
        <p>Location: Penang, Malaysia</p>
    </div>

    <!-- Contact Form -->
    <div class="card p-3 mt-3">
        <h4>Send Message</h4>

        <input type="text" class="form-control mb-2" placeholder="Your Name">
        <input type="email" class="form-control mb-2" placeholder="Your Email">
        <textarea class="form-control mb-2" placeholder="Message"></textarea>

        <button class="btn btn-success">Send</button>
    </div>

</div>

</body>
</html>
