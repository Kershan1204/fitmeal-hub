<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order - FitMeal Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">🥗 FitMeal Hub</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link active" href="order.html">Order</a></li>
        <li class="nav-item"><a class="nav-link" href="info.html">Info</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- TITLE -->
<div class="container mt-4">
  <h2 class="text-center text-success">Place Your Order 🥗</h2>
</div>

<!-- FORM -->
<div class="container mt-4">

  <div class="card p-4 shadow-sm">

    <!-- NAME -->
    <label>Customer Name</label>
    <input type="text" id="customerName" class="form-control mb-2">
    <small id="nameError" class="text-danger"></small>

    <!-- PHONE -->
    <label>Phone Number</label>
    <input type="text" id="phone" class="form-control mb-2">
    <small id="phoneError" class="text-danger"></small>

    <!-- MEAL -->
    <label>Select Meal</label>
    <select id="mealSelect" class="form-control mb-2">
      <option value="">-- Choose Meal --</option>
      <option>Grilled Chicken Set</option>
      <option>Salmon Salad Bowl</option>
      <option>Veggie Wrap</option>
      <option>Tuna Brown Rice</option>
      <option>Egg White Omelette</option>
    </select>

    <!-- PRICE PREVIEW -->
    <div id="pricePreview" class="alert alert-info mt-2" style="display:none;"></div>

    <!-- QUANTITY -->
    <label>Quantity</label>
    <input type="number" id="quantity" class="form-control mb-2">
    <small id="qtyError" class="text-danger"></small>

    <!-- BUTTONS -->
    <div class="mt-3">
      <button id="btnSubmit" class="btn btn-success">Submit Order</button>
      <button id="btnReset" class="btn btn-secondary">Reset</button>
    </div>

  </div>

</div>

<!-- OUTPUT -->
<div class="container mt-4">
  <div id="outputSection"></div>
</div>

<!-- HOW IT WORKS -->
<div class="container mt-5 text-center">
  <button id="toggleHowItWorks" class="btn btn-outline-success">
    Show Details ▼
  </button>

  <div id="howItWorksContent" style="display:none;" class="mt-3">
    <p>1. Choose your meal 🍱</p>
    <p>2. Enter your details 📱</p>
    <p>3. Click submit ✅</p>
  </div>
</div>

<!-- FOOTER -->
<footer class="bg-success text-white text-center py-3 mt-5">
  <p>© 2025 FitMeal Hub</p>
</footer>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="script.js"></script>

</body>
</html>
